[graph]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "warn"
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is currently dev-only here and also arrives transitively through pasture/nalgebra; replace with pastey or local macros in a dependency cleanup pass." },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSL-1.0",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
exceptions = [
    { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
]
